<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pipeline Dashboard</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #313244;
  --overlay: #45475a;
  --text: #cdd6f4;
  --subtext: #a6adc8;
  --blue: #89b4fa;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --teal: #94e2d5;
  --peach: #fab387;
  --pink: #f5c2e7;
  --border: #585b70;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--surface);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; color: var(--blue); font-weight: 700; }
.header .meta { color: var(--subtext); font-size: 13px; }
.metrics-bar {
  display: flex;
  gap: 16px;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.metric {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--overlay);
}
.tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.tab {
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--subtext);
  background: transparent;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.tab:hover { background: var(--overlay); color: var(--text); }
.tab.active { background: var(--blue); color: var(--bg); border-color: var(--blue); }
.view-toggle {
  display: flex;
  gap: 8px;
  padding: 8px 24px;
  align-items: center;
}
.view-toggle label { font-size: 12px; color: var(--subtext); }
.view-toggle select {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
}
.content { padding: 16px 24px; }

/* List View */
.app-table { width: 100%; border-collapse: collapse; }
.app-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--subtext);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.app-table th:hover { color: var(--blue); }
.app-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--overlay);
  vertical-align: middle;
}
.app-table tr:hover td { background: var(--surface); }
.app-table .score {
  font-weight: 700;
  font-size: 14px;
  min-width: 45px;
}
.app-table .company { font-weight: 600; color: var(--text); }
.app-table .role { color: var(--subtext); max-width: 250px; }
.app-table .date { color: var(--subtext); font-size: 12px; white-space: nowrap; }
.app-table .notes-cell {
  max-width: 200px;
  color: var(--subtext);
  font-size: 12px;
}

/* Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  border: none;
  letter-spacing: 0.3px;
}
.status-badge:hover { filter: brightness(1.2); }

.status-evaluated { background: rgba(203,166,247,0.2); color: var(--mauve); }
.status-applied { background: rgba(137,180,250,0.2); color: var(--blue); }
.status-responded { background: rgba(249,226,175,0.2); color: var(--yellow); }
.status-interview { background: rgba(166,227,161,0.2); color: var(--green); }
.status-offer { background: rgba(148,226,213,0.2); color: var(--teal); }
.status-rejected { background: rgba(243,139,168,0.2); color: var(--red); }
.status-discarded { background: rgba(88,91,112,0.3); color: var(--subtext); }
.status-skip { background: rgba(88,91,112,0.2); color: var(--subtext); }

/* Score colors */
.score-high { color: var(--green); }
.score-mid { color: var(--yellow); }
.score-low { color: var(--peach); }

/* Status Dropdown */
.status-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 50;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.status-dropdown button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 12px;
  font-size: 12px;
  border: none;
  background: transparent;
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
}
.status-dropdown button:hover { background: var(--overlay); }
.status-dropdown button.current { color: var(--blue); font-weight: 700; }

/* Group Headers */
.group-header {
  padding: 12px 0 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--subtext);
  border-bottom: 1px solid var(--border);
}
.group-header span { font-weight: 400; color: var(--overlay); }

/* Kanban View */
.kanban {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  padding: 16px 24px;
}
.kanban-column {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px;
  min-height: 200px;
}
.kanban-column-header {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-column-count {
  background: var(--overlay);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}
.kanban-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-top: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.kanban-card:hover { border-color: var(--blue); }
.kanban-card .card-score {
  font-weight: 700;
  font-size: 16px;
  float: right;
}
.kanban-card .card-company { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.kanban-card .card-role { font-size: 12px; color: var(--subtext); margin-bottom: 8px; }
.kanban-card .card-date { font-size: 11px; color: var(--overlay); }
.kanban-card .card-notes {
  font-size: 11px;
  color: var(--subtext);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

/* Detail Panel */
.detail-panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 450px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.2s ease;
  display: flex;
  flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.detail-header h2 { font-size: 16px; color: var(--text); }
.detail-close {
  background: none;
  border: none;
  color: var(--subtext);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.detail-close:hover { background: var(--overlay); color: var(--text); }
.detail-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
.detail-field {
  margin-bottom: 16px;
}
.detail-field label {
  font-size: 11px;
  color: var(--subtext);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 4px;
}
.detail-field .value { font-size: 14px; }
.detail-field textarea {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 60px;
}
.detail-field textarea:focus { outline: none; border-color: var(--blue); }
.detail-actions {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--overlay);
  color: var(--text);
  transition: all 0.15s;
}
.btn:hover { background: var(--blue); color: var(--bg); border-color: var(--blue); }
.btn-primary { background: var(--blue); color: var(--bg); border-color: var(--blue); }
.btn-primary:hover { filter: brightness(1.1); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  animation: slideIn 0.2s ease;
}
.toast.success { background: var(--green); color: var(--bg); }
.toast.error { background: var(--red); color: var(--bg); }
@keyframes slideIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

/* Link styles */
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Overlay for closing dropdowns */
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 40;
  background: transparent;
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .metrics-bar { padding: 8px 16px; gap: 8px; }
  .tabs { padding: 8px 16px; }
  .content { padding: 12px 16px; }
  .kanban { padding: 12px 16px; grid-template-columns: 1fr; }
  .detail-panel { width: 100%; }
  .app-table .notes-cell { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>CAREER PIPELINE</h1>
  <div class="meta" id="headerMeta">Loading...</div>
</div>

<div class="metrics-bar" id="metricsBar"></div>

<div class="tabs" id="tabs">
  <button class="tab active" data-filter="all">ALL</button>
  <button class="tab" data-filter="evaluated">EVALUATED</button>
  <button class="tab" data-filter="applied">APPLIED</button>
  <button class="tab" data-filter="responded">RESPONDED</button>
  <button class="tab" data-filter="interview">INTERVIEW</button>
  <button class="tab" data-filter="offer">OFFER</button>
  <button class="tab" data-filter="top">TOP ≥4</button>
</div>

<div class="view-toggle">
  <label>View:</label>
  <select id="viewMode">
    <option value="table">Table</option>
    <option value="kanban">Kanban</option>
  </select>
  <label style="margin-left:16px">Sort:</label>
  <select id="sortMode">
    <option value="score">Score</option>
    <option value="date">Date</option>
    <option value="company">Company</option>
    <option value="status">Status</option>
  </select>
</div>

<div id="mainContent" class="content"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h2 id="detailTitle">Details</h2>
    <button class="detail-close" onclick="closeDetail()">&times;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-actions" id="detailActions"></div>
</div>

<script>
let apps = [];
let currentFilter = 'all';
let currentSort = 'score';
let currentView = 'table';
let openDropdown = null;
let selectedApp = null;

const statusOrder = ['interview','offer','responded','applied','evaluated','skip','rejected','discarded'];
const statusLabels = {
  evaluated:'Evaluated', applied:'Applied', responded:'Responded',
  interview:'Interview', offer:'Offer', rejected:'Rejected',
  discarded:'Discarded', skip:'SKIP'
};
const statusColors = {
  evaluated:'var(--mauve)', applied:'var(--blue)', responded:'var(--yellow)',
  interview:'var(--green)', offer:'var(--teal)', rejected:'var(--red)',
  discarded:'var(--subtext)', skip:'var(--subtext)'
};
const validStatuses = ['Evaluated','Applied','Responded','Interview','Offer','Rejected','Discarded','SKIP'];

async function loadApps() {
  try {
    const res = await fetch('/api/applications');
    apps = await res.json();
    if (!apps) apps = [];
    render();
  } catch (e) {
    console.error('Failed to load applications:', e);
  }
}

function getFiltered() {
  let filtered = [...apps];
  if (currentFilter === 'top') {
    filtered = filtered.filter(a => a.score >= 4.0 && a.statusNorm !== 'skip');
  } else if (currentFilter !== 'all') {
    filtered = filtered.filter(a => a.statusNorm === currentFilter);
  }

  filtered.sort((a, b) => {
    switch (currentSort) {
      case 'score': return b.score - a.score;
      case 'date': return b.date.localeCompare(a.date);
      case 'company': return a.company.localeCompare(b.company);
      case 'status':
        return statusOrder.indexOf(a.statusNorm) - statusOrder.indexOf(b.statusNorm);
      default: return 0;
    }
  });

  return filtered;
}

function scoreClass(score) {
  if (score >= 4.5) return 'score-high';
  if (score >= 3.5) return 'score-mid';
  return 'score-low';
}

function render() {
  renderMetrics();
  renderTabs();
  if (currentView === 'kanban') renderKanban();
  else renderTable();
}

function renderMetrics() {
  const byStatus = {};
  apps.forEach(a => { byStatus[a.statusNorm] = (byStatus[a.statusNorm] || 0) + 1; });
  const total = apps.length;
  const avgScore = apps.length > 0
    ? (apps.reduce((s,a) => s + a.score, 0) / apps.filter(a => a.score > 0).length).toFixed(1)
    : '0.0';

  document.getElementById('headerMeta').textContent = `${total} offers | Avg ${avgScore}/5`;

  const bar = document.getElementById('metricsBar');
  bar.innerHTML = statusOrder
    .filter(s => byStatus[s])
    .map(s => `<span class="metric" style="color:${statusColors[s]}">${statusLabels[s]}: ${byStatus[s]}</span>`)
    .join('');
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    const filter = tab.dataset.filter;
    tab.classList.toggle('active', filter === currentFilter);
    let count;
    if (filter === 'all') count = apps.length;
    else if (filter === 'top') count = apps.filter(a => a.score >= 4.0 && a.statusNorm !== 'skip').length;
    else count = apps.filter(a => a.statusNorm === filter).length;
    const label = tab.textContent.replace(/\s*\(\d+\)/, '');
    tab.textContent = `${label} (${count})`;
  });
}

function renderTable() {
  const filtered = getFiltered();
  if (filtered.length === 0) {
    document.getElementById('mainContent').innerHTML =
      '<p style="color:var(--subtext);padding:32px;text-align:center">No applications match this filter</p>';
    return;
  }

  let html = `<table class="app-table">
    <thead><tr>
      <th>Score</th><th>Company</th><th>Role</th><th>Date</th>
      <th>Status</th><th>PDF</th><th>Report</th><th>Notes</th>
    </tr></thead><tbody>`;

  // Group by status in table view
  let lastStatus = '';
  filtered.forEach(app => {
    if (currentSort === 'score' || currentSort === 'status') {
      if (app.statusNorm !== lastStatus) {
        lastStatus = app.statusNorm;
        const groupCount = filtered.filter(a => a.statusNorm === app.statusNorm).length;
        html += `<tr><td colspan="8" class="group-header">
          ${statusLabels[app.statusNorm] || app.statusNorm} <span>(${groupCount})</span>
        </td></tr>`;
      }
    }

    html += `<tr onclick="openDetail(${app.number})" style="cursor:pointer">
      <td class="score ${scoreClass(app.score)}">${app.score.toFixed(1)}</td>
      <td class="company">${esc(app.company)}</td>
      <td class="role">${esc(app.role)}</td>
      <td class="date">${esc(app.date)}</td>
      <td>
        <button class="status-badge status-${app.statusNorm}"
                onclick="event.stopPropagation();toggleDropdown(event,${app.number})">
          ${statusLabels[app.statusNorm] || app.status}
        </button>
      </td>
      <td>${app.hasPdf ? '✅' : '❌'}</td>
      <td>${app.reportPath ? `<a href="#" onclick="event.stopPropagation();openDetail(${app.number})">📄 #${app.reportNumber}</a>` : '—'}</td>
      <td class="notes-cell" title="${esc(app.notes)}">${esc(truncate(app.notes, 40))}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('mainContent').innerHTML = html;
}

function renderKanban() {
  const grouped = {};
  const filtered = getFiltered();
  filtered.forEach(app => {
    const s = app.statusNorm;
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(app);
  });

  let html = '<div class="kanban">';
  statusOrder.forEach(status => {
    const group = grouped[status];
    if (!group || group.length === 0) return;

    html += `<div class="kanban-column">
      <div class="kanban-column-header" style="color:${statusColors[status]}">
        ${statusLabels[status]}
        <span class="kanban-column-count">${group.length}</span>
      </div>`;

    group.forEach(app => {
      html += `<div class="kanban-card" onclick="openDetail(${app.number})">
        <span class="card-score ${scoreClass(app.score)}">${app.score.toFixed(1)}</span>
        <div class="card-company">${esc(app.company)}</div>
        <div class="card-role">${esc(app.role)}</div>
        <div class="card-date">${esc(app.date)}</div>
        ${app.notes ? `<div class="card-notes">${esc(truncate(app.notes, 60))}</div>` : ''}
      </div>`;
    });

    html += '</div>';
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function toggleDropdown(e, appNum) {
  e.stopPropagation();
  closeAllDropdowns();

  const app = apps.find(a => a.number === appNum);
  if (!app) return;

  const btn = e.target.closest('.status-badge');
  const rect = btn.getBoundingClientRect();

  // Create overlay to close dropdown on outside click
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = closeAllDropdowns;
  document.body.appendChild(overlay);

  const dd = document.createElement('div');
  dd.className = 'status-dropdown';
  dd.style.position = 'fixed';
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';

  validStatuses.forEach(status => {
    const btn = document.createElement('button');
    btn.textContent = status;
    if (status.toLowerCase() === app.statusNorm || status === app.status) {
      btn.className = 'current';
    }
    btn.onclick = async () => {
      closeAllDropdowns();
      await updateStatus(appNum, status);
    };
    dd.appendChild(btn);
  });

  document.body.appendChild(dd);
  openDropdown = { dropdown: dd, overlay };
}

function closeAllDropdowns() {
  if (openDropdown) {
    openDropdown.dropdown.remove();
    openDropdown.overlay.remove();
    openDropdown = null;
  }
}

async function updateStatus(appNum, newStatus) {
  try {
    const res = await fetch(`/api/applications/${appNum}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (!res.ok) throw new Error(await res.text());
    showToast(`Status updated to ${newStatus}`, 'success');
    await loadApps();
  } catch (e) {
    showToast('Failed to update status: ' + e.message, 'error');
  }
}

async function updateNotes(appNum, notes) {
  try {
    const res = await fetch(`/api/applications/${appNum}/notes`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    });
    if (!res.ok) throw new Error(await res.text());
    showToast('Notes saved', 'success');
    await loadApps();
  } catch (e) {
    showToast('Failed to save notes: ' + e.message, 'error');
  }
}

function openDetail(appNum) {
  const app = apps.find(a => a.number === appNum);
  if (!app) return;
  selectedApp = app;

  document.getElementById('detailTitle').textContent = `${app.company} — ${app.role}`;

  let body = `
    <div class="detail-field">
      <label>Score</label>
      <div class="value ${scoreClass(app.score)}" style="font-size:24px;font-weight:700">${app.score.toFixed(1)}/5</div>
    </div>
    <div class="detail-field">
      <label>Status</label>
      <div class="value">
        <select id="detailStatus" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:100%">
          ${validStatuses.map(s => `<option value="${s}" ${s.toLowerCase()===app.statusNorm||s===app.status?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="detail-field">
      <label>Date</label>
      <div class="value">${esc(app.date)}</div>
    </div>
    <div class="detail-field">
      <label>Role</label>
      <div class="value">${esc(app.role)}</div>
    </div>
    <div class="detail-field">
      <label>PDF</label>
      <div class="value">${app.hasPdf ? '✅ Generated' : '❌ Not yet'}</div>
    </div>
    ${app.jobUrl ? `<div class="detail-field">
      <label>Job URL</label>
      <div class="value"><a href="${esc(app.jobUrl)}" target="_blank">${esc(truncate(app.jobUrl, 50))}</a></div>
    </div>` : ''}
    ${app.reportPath ? `<div class="detail-field">
      <label>Report</label>
      <div class="value"><a href="#" onclick="viewReport('${esc(app.reportPath)}')">View Report #${app.reportNumber}</a></div>
    </div>` : ''}
    <div class="detail-field">
      <label>Notes / Feedback</label>
      <textarea id="detailNotes" placeholder="Add notes about responses, feedback, interview dates...">${esc(app.notes)}</textarea>
    </div>
  `;

  document.getElementById('detailBody').innerHTML = body;
  document.getElementById('detailActions').innerHTML = `
    <button class="btn btn-primary" onclick="saveDetail()">Save Changes</button>
    <button class="btn" onclick="closeDetail()">Cancel</button>
  `;
  document.getElementById('detailPanel').classList.add('open');
}

async function saveDetail() {
  if (!selectedApp) return;

  const newStatus = document.getElementById('detailStatus').value;
  const newNotes = document.getElementById('detailNotes').value;

  if (newStatus !== selectedApp.status && validStatuses.includes(newStatus)) {
    await updateStatus(selectedApp.number, newStatus);
  }
  if (newNotes !== selectedApp.notes) {
    await updateNotes(selectedApp.number, newNotes);
  }

  closeDetail();
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedApp = null;
}

async function viewReport(path) {
  try {
    const res = await fetch(`/api/reports/${path}`);
    if (!res.ok) throw new Error('Report not found');
    const text = await res.text();

    const body = document.getElementById('detailBody');
    body.innerHTML = `<pre style="white-space:pre-wrap;font-size:12px;line-height:1.6;color:var(--text);font-family:inherit">${esc(text)}</pre>`;
    document.getElementById('detailActions').innerHTML = `
      <button class="btn" onclick="openDetail(${selectedApp.number})">Back</button>
      <button class="btn" onclick="closeDetail()">Close</button>
    `;
  } catch (e) {
    showToast('Failed to load report: ' + e.message, 'error');
  }
}

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

// Event listeners
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentFilter = tab.dataset.filter;
    render();
  });
});

document.getElementById('viewMode').addEventListener('change', e => {
  currentView = e.target.value;
  render();
});

document.getElementById('sortMode').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeAllDropdowns();
    closeDetail();
  }
});

// Click outside detail panel to close
document.addEventListener('click', e => {
  const panel = document.getElementById('detailPanel');
  if (panel.classList.contains('open') && !panel.contains(e.target)) {
    const isRowClick = e.target.closest('tr') || e.target.closest('.kanban-card');
    if (!isRowClick) closeDetail();
  }
});

// Initial load
loadApps();
</script>
</body>
</html>
