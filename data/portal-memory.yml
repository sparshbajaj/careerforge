# Portal Navigation Memory
# This file stores the required navigation steps, selectors, and form elements 
# for different job portals (e.g., Workday, Greenhouse, Lever, Workable).
#
# When applying via /career-ops:apply, the AI will first check this file. 
# If the portal exists, it will use the stored steps to navigate and fill out 
# the application quickly, saving tokens and execution time.
# If the portal is not found, the AI will learn the steps and append them here.

